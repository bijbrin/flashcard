version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: devlens
      POSTGRES_PASSWORD: devlens_password
      POSTGRES_DB: devlens
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devlens"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./my-app
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://devlens:devlens_password@db:5432/devlens
      KIMI_API_KEY: ${KIMI_API_KEY}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY}
      CRON_SECRET: ${CRON_SECRET:-dev-secret}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  cron:
    build:
      context: ./cron
      dockerfile: Dockerfile
    environment:
      API_URL: http://app:3000
      CRON_SECRET: ${CRON_SECRET:-dev-secret}
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
